name: Bug report
description: Report a defect in WP AI Connector
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short, clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: How can we reproduce this on a fresh WordPress install?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: wp_version
    attributes:
      label: WordPress version
      placeholder: "6.6.2"
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "8.2"
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: WP AI Connector version
    validations:
      required: true

  - type: textarea
    id: active_plugins
    attributes:
      label: Other active plugins
      description: Especially WooCommerce, Yoast SEO, ACF, or anything that might interact.

  - type: textarea
    id: logs
    attributes:
      label: Logs, curl output, or error messages
      render: shell
